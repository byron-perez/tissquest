{{define "collection-tr-modal"}}
<div x-data="{ open: false }" class="inline-block">
  <button @click="open = true" class="btn btn-ghost btn-xs text-secondary">
    + Create new TR
  </button>

  <div x-show="open" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
       @click.self="open = false">
    <div class="card bg-base-100 shadow-xl w-full max-w-md p-6 space-y-4">
      <h3 class="text-lg font-bold">Create New Tissue Record</h3>

      <form hx-post="/collections/{{.CollectionID}}/sections/{{.SectionID}}/tissue_records"
            hx-target="#assignments-{{.SectionID}}"
            hx-swap="innerHTML"
            @htmx:after-request="open = false"
            class="space-y-3">

        <div class="form-control">
          <label class="label" for="modal-tr-name">
            <span class="label-text">Name <span class="text-error">*</span></span>
          </label>
          <input id="modal-tr-name" type="text" name="name"
                 placeholder="Tissue record name"
                 class="input input-bordered input-sm w-full" required />
        </div>

        <div class="form-control">
          <label class="label" for="modal-tr-notes">
            <span class="label-text">Notes</span>
          </label>
          <textarea id="modal-tr-notes" name="notes"
                    placeholder="Optional notes"
                    class="textarea textarea-bordered textarea-sm w-full"
                    rows="2"></textarea>
        </div>

        <div class="flex gap-2 justify-end">
          <button type="button" @click="open = false" class="btn btn-ghost btn-sm">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm">Create & Assign</button>
        </div>
      </form>
    </div>
  </div>
</div>
{{end}}
