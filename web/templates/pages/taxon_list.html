{{define "content"}}
<div class="min-h-screen bg-base-200">
  <div class="max-w-5xl mx-auto px-6 py-8 space-y-6">

    {{template "main-menu" .}}

    {{template "breadcrumb" .}}

    <div class="flex items-center justify-between">
      <h1 class="text-3xl font-bold">Taxa</h1>
      <button class="btn btn-primary btn-sm"
              hx-get="/taxa/new"
              hx-target="#taxon-form-container"
              hx-swap="innerHTML">
        New Taxon
      </button>
    </div>

    <div id="taxon-form-container"></div>

    {{range .RankedGroups}}
    <div class="space-y-2">
      <h2 class="text-xl font-semibold capitalize">{{.Rank}}</h2>
      <div class="overflow-x-auto">
        <table class="table table-zebra w-full bg-base-100 shadow rounded-box">
          <thead>
            <tr>
              <th>Name</th>
              <th>Parent</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            {{range .Taxa}}
            <tr id="taxon-row-{{.ID}}">
              <td class="font-medium">{{.Name}}</td>
              <td class="text-base-content/70">
                {{if .Parent}}{{.Parent.Name}}{{end}}
              </td>
              <td class="text-right">
                <div class="inline-flex gap-2 items-center">
                  <button class="btn btn-ghost btn-sm"
                          hx-get="/taxa/{{.ID}}/edit"
                          hx-target="#taxon-row-{{.ID}}"
                          hx-swap="outerHTML">
                    Edit
                  </button>
                  <span id="taxon-row-{{.ID}}-delete">
                    <button class="btn btn-error btn-sm btn-outline"
                            hx-get="/taxa/{{.ID}}/confirm-delete"
                            hx-target="#taxon-row-{{.ID}}-delete"
                            hx-swap="outerHTML">
                      Delete
                    </button>
                  </span>
                </div>
              </td>
            </tr>
            {{else}}
            <tr>
              <td colspan="3" class="text-center text-base-content/50 py-4">No taxa in this rank.</td>
            </tr>
            {{end}}
          </tbody>
        </table>
      </div>
    </div>
    {{else}}
    <div class="text-center text-base-content/50 py-8">No taxa found.</div>
    {{end}}

  </div>
</div>
{{end}}
